[harness]
active_harness = "claude"
upstream_path = "/Users/iagoleal/dev/harness"

[session]
state_file = ".harness/estado-da-sessao.md"

[decisions]
dir = ".harness/decisoes"
index_file = ".harness/microdecisoes.md"
header_file = ".harness/decisoes/_cabecalho.md"

# Regenera o dicionário StarDict (dist/aurelio-stardict/) a partir do banco.
# Build determinístico e barato (~12 s) com validação de paridade embutida;
# falha barulhenta se o .db estiver ausente (restaurar via rclone, ver README).
[regen]
command = "cd pipeline && uv run aurelio-pipeline"
